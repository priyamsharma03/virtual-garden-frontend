<header class="navbar-wrap">
  <nav class="navbar page-container">
    <a class="brand" routerLink="/" (click)="closeMenu()">
      <img class="brand-logo" src="logo.jpeg" alt="Virtual Garden logo" />
      <span>Virtual Garden</span>
    </a>

    <button class="menu-btn" type="button" (click)="toggleMenu()" aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-right" [class.open]="menuOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
      <a routerLink="/plants" routerLinkActive="active" (click)="closeMenu()">Plants</a>
      <a routerLink="/garden-3d" routerLinkActive="active" (click)="closeMenu()">3D Garden</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
      <a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Admin</a>

      <button class="theme-toggle" type="button" (click)="toggleTheme()">
        @if (themeService.isDark()) {
          Light
        } @else {
          Dark
        }
      </button>
    </div>
  </nav>
</header>
