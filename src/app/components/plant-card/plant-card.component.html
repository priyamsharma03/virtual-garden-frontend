<article class="plant-card">
  <div class="image-wrap">
    <img [src]="plant.imageUrl" [alt]="plant.commonName" loading="lazy" />
    <span class="category">{{ plant.category }}</span>
  </div>

  <div class="content">
    <h3>{{ plant.commonName }}</h3>
    <p class="scientific">{{ plant.scientificName }}</p>
    <p class="description">{{ plant.shortDescription }}</p>

    <div class="uses">
      @for (use of plant.medicinalUses.slice(0, 2); track use) {
        <span class="use-pill" [title]="use">{{ use }}</span>
      }
    </div>

    <a class="view-link" [routerLink]="['/plants', plant.id]">View Details</a>
  </div>
</article>
