<section class="garden-page" @fadeInUp>
  <canvas #gardenCanvas aria-label="Interactive 3D medicinal garden"></canvas>

  <div class="overlay glass-panel">
    <h1>3D Medicinal Garden</h1>
    <p>Drag to orbit, scroll to zoom, and explore a stylized medicinal ecosystem.</p>
    <ul>
      <li>Use mouse or touch drag to rotate camera</li>
      <li>Scroll or pinch to zoom in and out</li>
      <li>Observe subtle plant sway for wind animation</li>
    </ul>
  </div>
</section>
